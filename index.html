<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JPTO | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: #F5F5F5;
  color: #111;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

header {
  padding: 100px 20px 60px;
  text-align: center;
}

h1 {
  font-size: 40px;
  margin: 0;
  font-weight: 600;
  letter-spacing: -1px;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #666;
}

.projects {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 100px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 40px;
}

.project {
  text-align: left;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.project:hover {
  transform: translateY(-8px);
  opacity: 0.85;
}

.project img {
  width: 100%;
  height: 300px;          /* controls thumbnail height */
  object-fit: cover;      /* crops image nicely */
  display: block;
  transition: transform 0.4s ease;
}

.adjust-right {
  object-position: 40% center;
}

  .video {
  max-width: 900px;
  margin: 0 auto 80px;
  padding: 0 20px;
}

.video iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
}
  
.project:hover img {
  transform: scale(1.03);
}

.project h3 {
  margin: 0 0 5px 0;
  font-size: 18px;
  font-weight: 500;
}

.project p {
  margin: 0;
  font-size: 14px;
  color: #666;
}

footer {
  text-align: center;
  padding: 60px 20px;
  border-top: 1px solid #eee;
  font-size: 14px;
  color: #777;
}

a {
  color: inherit;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>Juan Pablo Obert</h1>
  <p class="subtitle">3D Designer · Enviorment Artist · Game Dev</p>
</header>

  <div class="video">
    <iframe 
      src="https://youtu.be/YJmS-VTc1PM"
      title="Portafolio"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

<section class="projects">

  <a href="project1.html" class="project">
    <img src="images/metro render - Copy.png">
    <h3>Enviorment Design</h3>
    <p>3D Renders</p>
  </a>

  <a href="project2.html" class="project">
    <img src="images/Capture_front.PNG">
    <h3>3D Props and Projects</h3>
    <p>3D Projects</p>
  </a>

  <a href="project3.html" class="project">
    <img src="images/Screenshot 2022-07-28 142746.png" class="adjust-right">
    <h3>Game Design</h3>
    <p>Different Games</p>
  </a>

</section>

<footer>
  Contact — jpdelatobert@gmail.com
</footer>

</body>
</html>
