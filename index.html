<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JPTO | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  color: #111;

  background: linear-gradient(
    135deg,
    #ffffff,
    #e9edff,
    #f3f5ff,
    #ffffff
  );

  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

 body::before {
   display: none;
  /*content: "";
  position: fixed;
  inset: 0;
  opacity: 0.015;
  pointer-events: none;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");*/
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

header {
  padding: 120px 20px 80px;
  text-align: center;
}

h1 {
  font-size: 48px;
  font-weight: 600;
  letter-spacing: -1.5px;
}

.subtitle {
  margin-top: 12px;
  font-size: 18px;
  color: #777;
}

.projects {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px 120px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 60px;
}

.project {
  text-align: left;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.project:hover {
  transform: translateY(-8px);
  opacity: 0.85;
}

.project img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 15px;
  transition: transform 0.4s ease;
}

  .project {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.project.show {
  opacity: 1;
  transform: translateY(0);
}

.adjust-right {
  object-position: 40% center;
}

  .video {
  max-width: 900px;
  margin: 0 auto 80px;
  padding: 0 20px;
}

.video iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
}
  
.project:hover img {
  transform: scale(1.03);
}

.project h3 {
  margin: 0 0 5px 0;
  font-size: 18px;
  font-weight: 500;
}

.project p {
  margin: 0;
  font-size: 14px;
  color: #666;
}

footer {
  text-align: center;
  padding: 60px 20px;
  border-top: 1px solid #eee;
  font-size: 14px;
  color: #777;
}

a {
  color: inherit;
  text-decoration: none;
}
.navbar {
  position: sticky;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

.nav-container {
  max-width: 1200px;
  margin: auto;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.2px;
}

.nav-links a {
  margin-left: 30px;
  font-size: 14px;
  color: #555;
  transition: color 0.3s ease;
}

.nav-links a:hover {
  color: #000;
}
  
</style>
</head>

<body>

  <nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">Juan Pablo Obert</a>

    <div class="nav-links">
      <a href="index.html">Work</a>
    </div>
  </div>
</nav>

<header>
  <h1>Juan Pablo Obert</h1>
  <p class="subtitle">3D Designer · Enviorment Artist · Game Dev</p>
</header>

  <div class="video">
    <iframe 
      src="https://www.youtube.com/embed/YJmS-VTc1PM?si=oYVeAHEt3AMNPo0o"
      title="Portafolio"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

<section class="projects">

  <a href="project1.html" class="project">
    <img src="images/metro render - Copy.png">
    <h3>Enviorment Design</h3>
    <p>3D Renders</p>
  </a>

  <a href="project2.html" class="project">
    <img src="images/Capture_front.PNG">
    <h3>3D Props and Projects</h3>
    <p>3D Projects</p>
  </a>

  <a href="project3.html" class="project">
    <img src="images/Screenshot 2022-07-28 142746.png" class="adjust-right">
    <h3>Game Design</h3>
    <p>Different Games</p>
  </a>

</section>

<footer>
  Contact — jpdelatobert@gmail.com
</footer>
  <script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".project").forEach(el=>{
  observer.observe(el);
  });
  </script>
</body>
</html>
