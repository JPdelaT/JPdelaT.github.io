<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Name | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: #ffffff;
  color: #111;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

header {
  padding: 100px 20px 60px;
  text-align: center;
}

h1 {
  font-size: 40px;
  margin: 0;
  font-weight: 600;
  letter-spacing: -1px;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #666;
}

.projects {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 100px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 40px;
}

.project {
  text-align: left;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.project:hover {
  transform: translateY(-8px);
  opacity: 0.85;
}

.project img {
  width: 100%;
  display: block;
  margin-bottom: 15px;
  transition: transform 0.4s ease;
}

.project:hover img {
  transform: scale(1.03);
}

.project h3 {
  margin: 0 0 5px 0;
  font-size: 18px;
  font-weight: 500;
}

.project p {
  margin: 0;
  font-size: 14px;
  color: #666;
}

footer {
  text-align: center;
  padding: 60px 20px;
  border-top: 1px solid #eee;
  font-size: 14px;
  color: #777;
}

a {
  color: inherit;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>Your Name</h1>
  <p class="subtitle">Graphic Designer · Branding · UI</p>
</header>

<section class="projects">

  <a href="project1.html" class="project">
    <img src="project1.jpg">
    <h3>Project One</h3>
    <p>Brand identity & visual system</p>
  </a>

  <a href="project2.html" class="project">
    <img src="project2.jpg">
    <h3>Project Two</h3>
    <p>Website design & UX</p>
  </a>

  <a href="project3.html" class="project">
    <img src="project3.jpg">
    <h3>Project Three</h3>
    <p>Social campaign design</p>
  </a>

</section>

<footer>
  Contact — your@email.com
</footer>

</body>
</html>
