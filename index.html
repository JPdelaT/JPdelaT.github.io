<!DOCTYPE html>
<html>
<head>
  <title>Your Name | Portfolio</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
    }
    header {
      padding: 80px 20px;
      background: white;
    }
    h1 {
      margin: 0;
      font-size: 42px;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 8px;
    }
    footer {
      padding: 40px;
      background: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Graphic Designer | Branding | UI Design</p>
</header>

<section class="projects">
  <div class="card">
    <img src="project1.jpg">
    <h3>Project Title</h3>
    <p>Short description of the project.</p>
  </div>

  <div class="card">
    <img src="project2.jpg">
    <h3>Project Title</h3>
    <p>Short description of the project.</p>
  </div>
</section>

<footer>
  <p>Contact: your@email.com</p>
</footer>

</body>
</html>
